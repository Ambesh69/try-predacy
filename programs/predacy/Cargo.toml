[package]
name = "predacy"
version = "0.1.0"
description = "Predacy core Anchor program — sealed-bid batch auctions, LMSR bootstrap pools, blind LP vault, claim + redeem on Solana"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]
name = "predacy"

[features]
default = []
cpi = ["no-entrypoint"]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]
anchor-debug = []
custom-heap = []
custom-panic = []


[dependencies]
# init-if-needed: lets commit_lp_capital lazily create the LP vault PDA
# on first deposit + reuse it on later top-ups in the same window.
# Re-init-attack guard is in commit_lp_capital.rs (`!position.withdrawn`).
anchor-lang = { version = "1.0.0", features = ["init-if-needed"] }
anchor-spl = { version = "1.0.0", features = ["token"] }
solana-program = "3.0"
bytemuck = { version = "1.14", features = ["derive"] }

# Ika Pre-Alpha CPI SDK — lets our program CPI-call approve_message on the
# Ika dWallet program. See docs/ARCHITECTURE.md §4.
ika-dwallet-anchor = { git = "https://github.com/dwallet-labs/ika-pre-alpha" }

# On-chain Groth16 verification via Solana's native alt_bn128 syscalls (~120k CU
# per pairing check). Verifies proofs generated by snarkjs for our batch_clearing
# and claim circuits. See instructions/settle_batch.rs + claim_with_proof.rs.
groth16-solana = "0.2.0"

[dev-dependencies]
litesvm = "0.10.0"
solana-message = "3.0.1"
solana-transaction = "3.0.2"
solana-signer = "3.0.0"
solana-keypair = "3.0.1"


[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(target_os, values("solana"))'] }
