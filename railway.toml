# Railway service config — pinned to repo-root build context so the
# Dockerfile can COPY both `relayer/` AND `circuits/` into the image.
# (Required for USE_REAL_ZK=true: snarkjs needs circuit wasm + zkey at /circuits.)
#
# IMPORTANT NOTE on Railway's "builder" field: it does NOT have a "DOCKERFILE"
# enum — valid values are NIXPACKS / RAILPACK / PAKETO / HEROKU. To use a
# Dockerfile, leave `builder` at the default (RAILPACK) and set
# `dockerfilePath` — Railway's auto-detection switches to Docker mode when
# this is non-null.

[build]
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
