# Railway service config — pinned to repo-root build context so the
# Dockerfile can COPY both `relayer/` AND `circuits/` into the image.
# (Required for USE_REAL_ZK=true: snarkjs needs circuit wasm + zkey at /circuits.)
#
# IMPORTANT: After merging this, in Railway dashboard → service → Settings →
# Source → set "Root Directory" to empty (or "/") so this file is picked up
# and the Dockerfile path resolves correctly.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
